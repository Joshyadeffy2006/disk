<!DOCTYPE html>
<html>
<head>
<title>Disk Scheduling Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#0b132b;
    font-family:Arial;
    color:white;
    text-align:center;
}

.container{
    background:#1c2541;
    padding:20px;
    width:320px;
    margin:20px auto;
    border-radius:12px;
}

input,button{
    width:90%;
    padding:10px;
    margin:6px;
    border-radius:6px;
    border:none;
}

button{
    background:#00c896;
    color:white;
    cursor:pointer;
}

.card{
    background:#1c2541;
    margin:25px auto;
    padding:20px;
    border-radius:12px;
    width:85%;
    max-width:700px;
}

canvas{
    background:white;
    border-radius:10px;
    width:100% !important;
    max-width:600px;
    height:280px !important;
    margin:20px auto;
    display:block;
}
</style>
</head>

<body>

<h2>Disk Scheduling Simulator</h2>

<div class="container">
    <input id="req" placeholder="Requests (12 34 25 68 39)">
    <input id="head" placeholder="Head Position">
    <input id="size" placeholder="Disk Size">
    <input id="prev" placeholder="Previous Head Position">
    <button onclick="run()">Run Simulation</button>
</div>

<div id="output"></div>

<script>

// Seek Time
function calcSeek(seq){
    let seek=0;
    for(let i=0;i<seq.length-1;i++){
        seek+=Math.abs(seq[i]-seq[i+1]);
    }
    return seek;
}

// FCFS
function fcfs(req, head){
    return [head,...req];
}

// SSTF
function sstf(req, head){
    let arr=[...req], seq=[head];
    while(arr.length){
        let closest=arr.reduce((a,b)=>
            Math.abs(b-head)<Math.abs(a-head)?b:a
        );
        seq.push(closest);
        head=closest;
        arr.splice(arr.indexOf(closest),1);
    }
    return seq;
}

// SCAN (with previous)
function scan(req, head, size, prev){
    let left=req.filter(x=>x<head).sort((a,b)=>b-a);
    let right=req.filter(x=>x>=head).sort((a,b)=>a-b);

    let seq=[head];

    if(prev < head){
        seq=seq.concat(right);
        seq.push(size-1);
        seq=seq.concat(left);
    } else {
        seq=seq.concat(left);
        seq.push(0);
        seq=seq.concat(right);
    }

    return seq;
}

// C-SCAN
function cscan(req, head, size, prev){
    let left=req.filter(x=>x<head).sort((a,b)=>a-b);
    let right=req.filter(x=>x>=head).sort((a,b)=>a-b);

    let seq=[head];

    if(prev < head){
        seq=seq.concat(right);
        seq.push(size-1);
        seq.push(0);
        seq=seq.concat(left);
    } else {
        seq=seq.concat(left.reverse());
        seq.push(0);
        seq.push(size-1);
        seq=seq.concat(right.reverse());
    }

    return seq;
}

// LOOK
function look(req, head, prev){
    let left=req.filter(x=>x<head).sort((a,b)=>b-a);
    let right=req.filter(x=>x>=head).sort((a,b)=>a-b);

    let seq=[head];

    if(prev < head){
        seq=seq.concat(right);
        seq=seq.concat(left);
    } else {
        seq=seq.concat(left);
        seq=seq.concat(right);
    }

    return seq;
}

// C-LOOK
function clook(req, head, prev){
    let left=req.filter(x=>x<head).sort((a,b)=>a-b);
    let right=req.filter(x=>x>=head).sort((a,b)=>a-b);

    let seq=[head];

    if(prev < head){
        seq=seq.concat(right);
        seq=seq.concat(left);
    } else {
        seq=seq.concat(left.reverse());
        seq=seq.concat(right.reverse());
    }

    return seq;
}

// Draw Chart
function draw(name, seq){
    let id="chart_"+name;

    let points=seq.map((val,i)=>({x:i,y:val}));

    document.getElementById("output").innerHTML+=`
    <div class="card">
        <h3>${name}</h3>
        <p><b>Sequence:</b> ${seq.join(" → ")}</p>
        <p><b>Seek Time:</b> ${calcSeek(seq)}</p>
        <canvas id="${id}"></canvas>
    </div>
    `;

    setTimeout(()=>{
        new Chart(document.getElementById(id),{
            type:'line',
            data:{
                datasets:[{
                    data:points,
                    borderColor:"#007bff",
                    borderDash:[6,6],
                    pointRadius:4,
                    fill:false,
                    tension:0
                }]
            },
            options:{
                responsive:true,
                maintainAspectRatio:false,
                plugins:{ legend:{display:false}},
                scales:{
                    x:{ type:'linear', title:{display:true,text:"Step"}},
                    y:{ title:{display:true,text:"Disk Position"}}
                }
            }
        });
    },100);
}

// Run
function run(){
    document.getElementById("output").innerHTML="";

    let req=document.getElementById("req").value.split(" ").map(Number);
    let head=parseInt(document.getElementById("head").value);
    let size=parseInt(document.getElementById("size").value);
    let prev=parseInt(document.getElementById("prev").value);

    draw("FCFS", fcfs(req,head));
    draw("SSTF", sstf(req,head));
    draw("SCAN", scan(req,head,size,prev));
    draw("C-SCAN", cscan(req,head,size,prev));
    draw("LOOK", look(req,head,prev));
    draw("C-LOOK", clook(req,head,prev));
}

</script>

</body>
</html>
